<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume</title>
  </head>
  <body>
    <form action="">
    <header>
    <h1 align="center"><u> Resume</u></h1>
    <div align="center">
      <input type="text" placeholder="User Name" required />
    </div>
    <p align="center">Java devloper | Android Devloper</p>
    </header>
    <hr />
    <main>
    <p>Email :* <input type="email" required /></p>
    <p>Phone No : * <input type="number" required /></p>
    <p>Location :* <input type="text" required /></p>
    <hr />
    <h3>CARRER OBJECTIVE</h3>
    <table border="1">
      <thead>
        <tr>
          <th>Degree</th>
          <th>Collage</th>
          <th>University</th>
          <th>Year</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td><input type="text" placeholder="Enter Course" required /></td>
          <td>
            <input type="text" placeholder="Enter Collage Name" required />
          </td>
          <td>
            <input type="text" placeholder="Enter University Name" required />
          </td>
          <td>
            <input type="number" placeholder="Enter Collage Year" required />
          </td>
        </tr>
      </tbody>
    </table>
    <br />
    <hr />
    <h3>SKILLS</h3>
    <ul>
      <li>java<input type="radio" /></li>
      <li>HTML<input type="radio" /></li>
      <li>CSS<input type="radio" /></li>
      <li>JavaScript <input type="radio" /></li>
      <li>Firebase <input type="radio" /></li>
      <li>MySQL <input type="radio" /></li>
    </ul>
    <br />
    <hr />
    <h3>PROJECTS</h3>
    <textarea name="Project" id="" rows="10" placeholder="Project 1" required></textarea>
    <textarea name="Project" id="" rows="10" placeholder="Project 2"  required></textarea>
    <textarea name="Project" id="" rows="10" placeholder="Project 3"></textarea>
    <br>
    <hr>
    <h3>HOBBIES</h3>
    <ul>
        <li><input type="text"></li><br>
        <li><input type="text"></li><br>
        <li><input type="text"></li><br>
        <li><input type="text"></li><br>
        <li><input type="text"></li><br>
    </ul>
    <br>
    <hr>
    <h3>DECLARATION</h3>
    <p><textarea name="Declaration" id="" placeholder="Type Declaration"  rows="10" ></textarea></p>
    <p>
        Date : <input type="date">
    </p>
    <h4 align="right">Signature : ___________</h4>
    <br>
    <hr>
    </main>
    <footer>
        <p align="center">@ <textarea name="Rights" id="" placeholder="Name & All right REserved"></textarea></p>
        <p align="right"><input type="submit"></p>
        <p align="right"><button type="submit"> Download</p>
    </footer>
    </form>
  </body>
</html>

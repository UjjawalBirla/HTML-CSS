<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather APP</title>
    <link rel="stylesheet" href="StyleW.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input type="Search" placeholder="Enter the city" spellcheck="false">
            <button><i class="fa-brands fa-sistrix"></i></button>
        </div>
        <div class="error"><p>Invalid City Name</p></div>
        <div class="weather">
            <i class="weather-icon fa-solid fa-cloud-rain "></i>
            <h1 class="temp">22°c</h1>
            <h2 class="city">New York</h2>

            <div class="details">
                <div class="col">
                 <i class="fa-solid fa-water icon"></i>       
                    <div>
                        <p class="humidity">50%</p>
                        <p>Humidity</p>
                    </div>
                </div>
                <div class="col">
                    <i class="fa-solid fa-wind icon"></i>
                    <div>
                        <p class="Wind">15 km/h</p>
                        <p>Wind Spedd</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
   
    <script src="Script.js"></script>
</body>
</html>

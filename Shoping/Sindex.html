<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="Sstyle.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body>
    <div class="header">
      <header class="navbar">
        <div class="container">
          <div class="search-box">
            <i class="fa-brands fa-sistrix search-icon"></i>
            <input type="text" placeholder="Search" />
          </div>

          <div class="right">
            <a href="">SHOP</a>
            <a href="">LOCKBOOK</a>
            <a href="">SPECIAL</a>
          </div>

          <div class="logo">
            <h3>MOBILLIO</h3>
          </div>

          <div class="left">
            <a href="">ABOUT</a>
            <a href="">BLOG</a>
            <a href="">CONTACT</a>
          </div>

          <div class="icon">
            <a href=""><i class="fa-solid fa-cart-arrow-down"></i></a>
            <a href=""><i class="fa-solid fa-circle-h"></i></a>
            <a href=""><i class="fa-solid fa-circle-user"></i></a>
          </div>
        </div>
      </header>
    </div>
    <div class="main-div">
      <div class="sub-div">
        <div class="box1">
          <div class="box2">
            <div class="box3">
              <div class="box4">
                <img class="line" src="line.svg" alt="line" />
                <span class="trend-date">
                  <span class="trands">furniture</span>
                  <br />
                  <span class="date">trends - 2022</span>
                </span>
              </div>
              <div class="Name"><h1>YELLOSTONE</h1></div>
              <div class="price">
                <span class="FROM">FROM</span>
                <span class="money">$339</span>
              </div>
              <div class="collection">
                <button>Explore More Collection</button>
              </div>
            </div>
            <img class="imgd" src="download.png" alt="img" />
          </div>
        </div>
      </div>
    </div>

    <div class="under-main">
      <div class="sub-under-main">
        <div class="CATEGORIEs">
          <h1 class="SHOP_BY_CATEGORIES">SHOP BY CATEGORIES</h1>
          <span class="discription"
            >Start shopping based on the categories you are interested in</span
          >
        </div>
        <div class="imagesProduct">
          <div class="item">
            <img src="img11.jpg" alt="" /><span class="desk">desk</span>
          </div>
          <div class="item">
            <img src="img12.jpg" alt="" /><span class="Chairs">Chairs</span>
          </div>
          <div class="item">
            <img src="img13.jpg" alt="" /><span class="Tables">Tables</span>
          </div>
          <div class="item">
            <img src="img14.jpg" alt="" /><span class="Lamps">Lamps</span>
          </div>
          <div class="item">
            <img src="img15.jpg" alt="" /><span class="Plants">Plants</span>
          </div>
          <div class="item">
            <img src="img16.jpg" alt="" /><span class="Decoration"
              >Decoration</span
            >
          </div>
          <div class="item">
            <img src="img17.jpg" alt="" /><span class="Collections"
              >Collections</span
            >
          </div>
        </div>
      </div>
    </div>

    <div class="main-footer">
      <div class="footer-div">
        <h3 class="MOBILLIO">MOBILLIO</h3>
        <span class="span1"></span>
        <span class="span2">FURNITURE</span>
      </div>
    </div>
  </body>
</html>

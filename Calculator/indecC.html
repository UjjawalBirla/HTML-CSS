<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
     <link rel="stylesheet" href="StyleC.css">
  </head>
 
  <body>

    <video autoplay loop muted class="back-video" src="large-thumbnail20230815-32341-1ks0yvj.mp4"></video>
   
   
    <header>
      <h1 class="name">CALCULATOR</h1>
    </header>
 <div class="mera-content"></div>
    <main>
      <div class="structure">
        <div class="buttons">
          <div class="type">
            <input class="typing" type="text" />
          </div>
          <div class="types-buttons">
            <div class="box1">
            <div class="random">             
             <button class="btn">AC</button>
            </div>
            <div class="random">
              <button class="btn">DEL</button>
            </div>
            <div class="random">
               <button class="btn">%</button>
            </div>
            <div class="random">
              <button class="btn">/</button>
            </div>
            </div>
            <div class="box2">
            <div class="random">
              <button class="btn">7</button>
            </div>
            <div class="random">
              <button class="btn">8</button>
            </div>
            <div class="random">
              <button class="btn">9</button>
            </div>
            <div class="random">
              <button class="btn">*</button>
            </div>
            </div>
            <div class="box3">
            <div class="random">
              <button class="btn">4</button>
            </div>
            <div class="random">
              <button class="btn">5</button>
            </div>
            <div class="random">
              <button class="btn">6</button>
            </div>
            <div class="random">
              <button class="btn">-</button>
            </div>
            </div>
            <div class="box4">
            <div class="random">
              <button class="btn">1</button>
            </div>
            <div class="random">
              <button class="btn">2</button>
            </div>
            <div class="random">
              <button class="btn">3</button>
            </div>
            <div class="random">
              <button class="btn">+</button>
            </div>
            </div>
            <div class="box5">
            <div class="random">
              <button class="btn">00</button>
            </div>
            <div class="random">
              <button class="btn">0</button>
            </div>
            <div class="random">
              <button class="btn">.</button>
            </div>
            <div class="random">
              <button class="btn">=</button>
            </div>
            </div>
          </div>
        </div>
      </div>
       </div>
    </main>
    <script src="javaScriptC.js"></script>
  </body>
</html>
